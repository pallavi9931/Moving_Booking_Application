server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: show-service
          uri: http://localhost:8081
          predicates:
            - Path=/shows/**
        - id: booking-service
          uri: http://localhost:8082
          predicates:
            - Path=/booking,/booking/**
