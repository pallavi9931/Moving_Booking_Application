server:
  port: 8080

spring:
  application:
    name: api-gateway
  datasource:
    url: jdbc:mysql://localhost:3306/gateway_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: Saraansh017@12
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          "[/**]":
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
      routes:
        - id: auth-endpoints
          uri: forward:///
          predicates:
            - Path=/auth/**
        - id: show-service
          uri: http://localhost:8081
          predicates:
            - Path=/shows,/shows/**
        - id: booking-service
          uri: http://localhost:8082
          predicates:
            - Path=/booking,/booking/**
